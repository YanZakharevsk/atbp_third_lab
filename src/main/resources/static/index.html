<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор нормы воды</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <h1>💧 Дневная норма воды</h1>
    <p class="subtitle">Рассчитайте рекомендуемую норму потребления воды</p>

    <div class="form-group">
        <label for="city">🌍 Город</label>
        <select id="city" class="form-control">
            <option value="" disabled selected>-- Выберите город --</option>
            <option value="minsk">Минск (-5°C)</option>
            <option value="gomel">Гомель (-8°C)</option>
            <option value="vitebsk">Витебск (15°C)</option>
            <option value="grodno">Гродно (35°C)</option>
            <option value="brest">Брест (40°C)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="weight">⚖️ Вес (кг)</label>
        <input type="number" id="weight" class="form-control" placeholder="Введите ваш вес">
        <small class="hint">Допустимый диапазон: 5-250 кг</small>
    </div>

    <div class="form-group">
        <label for="activity">🏃 Физическая активность (минут)</label>
        <input type="number" id="activity" class="form-control" placeholder="Время активности" value="60">
    </div>

    <button id="calculateBtn" class="btn">Рассчитать норму</button>

    <div id="result" class="result hidden">
        <div class="result-icon">💧</div>
        <div class="result-text"></div>
        <div class="result-temp"></div>
    </div>

    <div id="error" class="error hidden"></div>
</div>

<script src="/script.js"></script>
</body>
</html>
