name: CI Pipeline for Water Calculator

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'

jobs:
  # ============================================
  # JOB 1: Модульные и API тесты (JUnit + Cucumber)
  # ============================================
  backend-tests:
    name: Backend Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: [17, 21]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Run tests with Allure
        run: mvn clean test

      - name: Generate Allure report
        run: |
          mvn allure:report
        continue-on-error: true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-backend-${{ matrix.os }}-java-${{ matrix.java }}
          path: |
            target/allure-results/
            target/surefire-reports/

  # ============================================
  # JOB 2: UI тесты (Playwright)
  # ============================================
  ui-tests:
    name: UI Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
        browser: [chromium, firefox]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}

      - name: Start Spring Boot server
        run: |
          mvn spring-boot:run &
          npx wait-on http://localhost:8081/api/status --timeout 60000

      - name: Run UI tests with Allure
        run: npm run test:ui -- --project=${{ matrix.browser }}
        continue-on-error: true

      - name: Upload Playwright results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.node }}-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
            allure-results/

  # ============================================
  # JOB 3: Генерация Allure отчёта и публикация
  # ============================================
  allure-report:
    name: Generate and Publish Allure Report
    runs-on: ubuntu-latest
    needs: [backend-tests, ui-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download Allure results from all jobs
        uses: actions/download-artifact@v4
        with:
          path: all-allure-results/

      - name: Merge Allure results
        run: |
          mkdir -p merged-allure-results
          find all-allure-results -name "*.json" -exec cp {} merged-allure-results/ \; 2>/dev/null || true
          find all-allure-results -name "*.txt" -exec cp {} merged-allure-results/ \; 2>/dev/null || true
          find all-allure-results -name "*.xml" -exec cp {} merged-allure-results/ \; 2>/dev/null || true
          find all-allure-results -name "*.png" -exec cp {} merged-allure-results/ \; 2>/dev/null || true
          echo "Files in merged directory:"
          ls -la merged-allure-results/

      - name: Install Allure CLI
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.zip
          unzip allure-2.24.0.zip
          sudo mv allure-2.24.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure Report
        run: |
          allure generate merged-allure-results --clean -o allure-report
        continue-on-error: true

      - name: Upload Allure Report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-reports/${{ github.run_number }}
          keep_files: true

  # ============================================
  # JOB 4: Уведомление в Telegram
  # ============================================
  notify-telegram:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [backend-tests, ui-tests, allure-report]
    if: always()

    steps:
      - name: Check overall status
        id: status
        run: |
          BACKEND_STATUS="${{ needs.backend-tests.result }}"
          UI_STATUS="${{ needs.ui-tests.result }}"
          
          if [ "$BACKEND_STATUS" = "success" ] && [ "$UI_STATUS" = "success" ]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=All tests passed successfully!" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Some tests failed. Check Allure report for details." >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ${{ steps.status.outputs.emoji }} **CI Pipeline ${{ steps.status.outputs.status }}**
            
            📦 **Repository:** ${{ github.repository }}
            🔀 **Branch:** ${{ github.ref_name }}
            💬 **Commit:** ${{ github.event.head_commit.message }}
            👤 **Author:** ${{ github.actor }}
            🔗 **Run:** [View details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            📊 **Status:**
            - Backend tests: ${{ needs.backend-tests.result }}
            - UI tests: ${{ needs.ui-tests.result }}
            
            ${{ steps.status.outputs.message }}
            
            📈 **Allure Report:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-reports/${{ github.run_number }}/