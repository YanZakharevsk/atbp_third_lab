name: CI Pipeline for Water Calculator

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '17'
  SERVER_PORT: 8081

jobs:
  # ============================================
  # JOB 1: Модульные и API тесты (JUnit + Cucumber)
  # ============================================
  backend-tests:
    name: Backend Tests (Java ${{ matrix.java }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: [17, 21]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run backend tests (JUnit + Cucumber)
        run: mvn clean test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports-${{ matrix.os }}-java-${{ matrix.java }}
          path: |
            target/surefire-reports/
            target/cucumber-reports/

  # ============================================
  # JOB 2: UI тесты (Playwright)
  # ============================================
  ui-tests:
    name: UI Tests (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [18, 20, 22]
        browser: [chromium, firefox, webkit]
        exclude:
          - os: ubuntu-latest
            browser: webkit
          - os: windows-latest
            browser: webkit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}

      - name: Start Spring Boot server
        run: |
          mvn spring-boot:run &
          npx wait-on http://localhost:8081/api/status

      - name: Run UI tests
        run: npm run test:ui -- --project=${{ matrix.browser }}

      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}-node-${{ matrix.node }}-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: test-results/**/*.png

  # ============================================
  # JOB 3: Генерация отчёта (опционально)
  # ============================================
  report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [backend-tests, ui-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all test reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: List all reports
        run: |
          echo "=== All reports ==="
          ls -la all-reports/
          find all-reports -name "*.html" -type f | head -20

      - name: Upload consolidated report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consolidated-test-report
          path: all-reports/

  # ============================================
  # JOB 4: Уведомление о результате
  # ============================================
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [backend-tests, ui-tests, report]
    if: always()

    steps:
      - name: Check overall status
        run: |
          echo "=== CI Pipeline Summary ==="
          echo "Backend Tests Status: ${{ needs.backend-tests.result }}"
          echo "UI Tests Status: ${{ needs.ui-tests.result }}"
          echo "Report Generation: ${{ needs.report.result }}"
          
          if [ "${{ needs.backend-tests.result }}" = "success" ] && \
             [ "${{ needs.ui-tests.result }}" = "success" ]; then
            echo " All tests passed!"
          else
            echo "Some tests failed!"
            exit 1
          fi